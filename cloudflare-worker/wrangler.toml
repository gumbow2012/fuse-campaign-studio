name = "shiny-rice-e95bfuse-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# R2 bucket binding
[[r2_buckets]]
binding = "ASSETS"
bucket_name = "fuse-assets"

# Secrets (set via `wrangler secret put`)
# SUPABASE_URL
# SUPABASE_ANON_KEY
# SUPABASE_SERVICE_ROLE_KEY
# WEAVY_API_BASE_URL (legacy — HAR import only)
# WEAVY_FIREBASE_API_KEY (legacy)
# WEAVY_REFRESH_TOKEN (legacy)
# FAL_API_KEY — fal.ai key for nano-banana-pro image gen
# KLING_API_KEY — Kling key for video generation

