name = "shiny-rice-e95bfuse-api"
main = "src/index.ts"
account_id = "fc1475b3027b02c9aef41534caae907d"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[[r2_buckets]]
binding = "FUSE_ASSETS"
bucket_name = "fuse-assets"

[[r2_buckets]]
binding = "FUSE_TEMPLATES"
bucket_name = "fuse-templates"

# Secrets (set via `wrangler secret put`)
# SUPABASE_URL
# SUPABASE_ANON_KEY
# SUPABASE_SERVICE_ROLE_KEY
# WEAVY_API_BASE_URL (legacy — HAR import only)
# WEAVY_FIREBASE_API_KEY (legacy)
# WEAVY_REFRESH_TOKEN (legacy)
# FAL_API_KEY — fal.ai key for nano-banana-2 image editing
# KLING_ACCESS_KEY — Kling access key (from developer portal)
# KLING_SECRET_KEY — Kling secret key (for JWT signing)
# GEMINI_API_KEY — Google Gemini API key for Nano Banana image generation