# Fuse Worker — Cloudflare deployment config
name = "shiny-rice-e95bfuse-api"
main = "src/index.js"
compatibility_date = "2024-09-01"
account_id = "fc1475b3027b02c9aef41534caae907d"

# ── R2 bucket bindings ──
[[r2_buckets]]
binding = "FUSE_TEMPLATES"
bucket_name = "fuse-templates"

[[r2_buckets]]
binding = "FUSE_ASSETS"
bucket_name = "fuse-assets"

# ── Secrets (set via CLI) ──
# wrangler secret put AUTH_TOKEN
# wrangler secret put SUPABASE_URL
# wrangler secret put SUPABASE_ANON_KEY
# wrangler secret put NANO_BANANA_API_URL
# wrangler secret put NANO_BANANA_API_KEY
# wrangler secret put KLING_API_URL
# wrangler secret put KLING_API_KEY
# wrangler secret put ASSETS_PUBLIC_URL   (optional)
