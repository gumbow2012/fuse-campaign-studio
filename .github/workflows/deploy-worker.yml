name: Deploy Cloudflare Worker

on:
  push:
    branches: [main]
    paths:
      - 'cloudflare-worker/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloudflare-worker

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      # ── Deploy V6 worker ──────────────────────────────────────
      - name: Deploy Worker to Cloudflare
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # ── Upload all template JSONs to R2 ───────────────────────
      - name: Upload Template JSONs to R2
        run: |
          for file in templates/*_template.json; do
            key=$(basename "$file")
            echo "Uploading $key..."
            npx wrangler r2 object put "fuse-templates/$key" \
              --remote \
              --file="$file" \
              --content-type="application/json"
          done
          echo "All templates uploaded."
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # ── Set ALL worker secrets (on manual dispatch only) ─────
      # Trigger via: Actions → Deploy Cloudflare Worker → Run workflow
      - name: Set Worker Secrets
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "${{ secrets.SUPABASE_URL }}" | npx wrangler secret put SUPABASE_URL
          echo "${{ secrets.SUPABASE_ANON_KEY }}" | npx wrangler secret put SUPABASE_ANON_KEY
          echo "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" | npx wrangler secret put SUPABASE_SERVICE_ROLE_KEY
          echo "${{ secrets.FAL_API_KEY }}" | npx wrangler secret put FAL_API_KEY
          echo "${{ secrets.KLING_AK }}" | npx wrangler secret put KLING_AK
          echo "${{ secrets.KLING_SK }}" | npx wrangler secret put KLING_SK
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
